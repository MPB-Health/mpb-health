name: "Security Scan (SOC 2 & HIPAA Compliance)"

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    # SOC 2 CC7.1: Run security scans weekly for continuous monitoring
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Detection (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency Audit (Critical/High block)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.15.4"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # SOC 2 CC8.1: Block builds with critical/high vulnerabilities
      - name: Audit dependencies (fail on critical/high)
        run: pnpm audit --prod --audit-level=high

      - name: Check for known vulnerable packages
        run: |
          echo "Checking for packages with known CVEs..."
          npx audit-ci --config .audit-ci.json || true

  sast-scan:
    name: Static Application Security Testing (SAST)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  license-compliance:
    name: License Compliance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.15.4"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # SOC 2 CC3.2: Verify no copyleft or restricted licenses
      - name: Check licenses
        run: |
          npx license-checker --production --failOn "GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0;SSPL-1.0" --summary || echo "License check completed with warnings"

  security-headers-check:
    name: Verify Security Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # SOC 2 CC6.7: Verify all apps have required security headers
      - name: Check security headers in vercel.json files
        run: |
          REQUIRED_HEADERS=("Strict-Transport-Security" "X-Frame-Options" "X-Content-Type-Options" "Content-Security-Policy" "Referrer-Policy" "Permissions-Policy" "Cross-Origin-Opener-Policy")
          
          for config in apps/*/vercel.json; do
            echo "Checking $config..."
            for header in "${REQUIRED_HEADERS[@]}"; do
              if ! grep -q "$header" "$config"; then
                echo "ERROR: Missing $header in $config"
                exit 1
              fi
            done
            echo "  ✓ All required headers present"
          done
          echo "All security headers verified."
