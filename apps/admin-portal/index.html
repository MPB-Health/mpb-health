<!doctype html>
<html lang="en" class="light">
  <head>
    <script>
      (function(){var t=localStorage.getItem('mpb-theme');if(t==='dark'){document.documentElement.classList.replace('light','dark')}})();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A4E8E" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0E2D41" media="(prefers-color-scheme: dark)" />
    <meta name="msapplication-TileColor" content="#0A4E8E" />
    <title>MPB Health - Admin Portal</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MQMM1N1MSL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MQMM1N1MSL', { send_page_view: false });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function(){
        var k='admin_chunk_reload_ts';
        function isChunkErr(e){var m=(e&&e.reason&&e.reason.message)||'';return /Failed to fetch|ChunkLoadError|ERR_CACHE_READ_FAILURE|dynamically imported module/i.test(m);}
        function shouldReload(){try{var t=sessionStorage.getItem(k);if(!t)return true;return Date.now()-parseInt(t,10)>30000;}catch(r){return true;}}
        function mark(){try{sessionStorage.setItem(k,Date.now().toString());}catch(r){}}
        window.addEventListener('unhandledrejection',function(e){
          if(!isChunkErr(e))return;
          e.preventDefault();
          if(shouldReload()){mark();if(window.caches){caches.keys().then(function(n){Promise.all(n.map(function(x){return caches.delete(x);})).finally(function(){location.reload();});}).catch(function(){location.reload();});}else{location.reload();}}
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
