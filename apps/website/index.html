    <!-- ──────────────────────────────────────────────────────────────────
         Default page metadata (homepage / SPA fallback).

         Per-route metadata is generated at BUILD time by
         apps/website/scripts/prerender-seo.mjs, which writes
         dist/<route>/index.html for every entry in src/lib/page-seo-data.json.

         Vercel's static-file matching serves dist/<route>/index.html before
         the SPA-fallback rewrite, so crawlers and social cards see correct
         per-route metadata. JS-enabled visitors hydrate and react-helmet-async
         re-syncs the head from the React tree.

         To edit homepage SEO: change the "/" entry in page-seo-data.json AND
         keep the tags below in sync (the prerender script also rewrites
         dist/index.html from the JSON to guarantee they stay aligned).
         ────────────────────────────────────────────────────────────────── -->
    <title>Affordable HealthShare Memberships | MPB Health</title>

    <!-- ──────────────────────────────────────────────────────────────────
         Site-wide JSON-LD structured data (Sprint 2 — GEO / Local SEO)

         These three nodes are referenced by @id so Google can merge them
         into a single knowledge graph:
           • Organization      — corporate identity
           • MedicalOrganization+LocalBusiness — Local SEO + medical category
           • WebSite           — sitelinks + sitelinks searchbox

         Kept STATIC (not in Helmet) so non-JS SEO crawlers see them. The
         per-page Article/FAQ/HowTo schemas remain in their pages' Helmet
         blocks via lib/schemaMarkup.ts. The single source of truth for
         these schemas is apps/website/src/lib/schemaMarkup.ts — keep this
         block in sync when editing those functions.
         ────────────────────────────────────────────────────────────────── -->
    <script type="application/ld+json">

    <!-- Zoho SalesIQ bootstrap (matches Zoho embed; widget code is passed via ?wc= on script URL) -->
    <script>
      window.$zoho = window.$zoho || {};
      window.$zoho.salesiq = window.$zoho.salesiq || { ready: function () {} };
      window.$zoho.salesiq.values = window.$zoho.salesiq.values || {};
    </script>

    <!-- Defer third-party scripts to load after main app -->
    <script>
      // Public site hostnames only — align with packages/config DOMAINS.website (www) + apex mpb.health
      function isProductionHostname() {
        var hostname = window.location.hostname;
        return hostname === 'mpb.health' || hostname === 'www.mpb.health';
      }

      // Load third-party scripts after page interactive
      if ('requestIdleCallback' in window) {
        requestIdleCallback(() => {
          loadThirdPartyScripts();
        });
      } else {
        setTimeout(() => {
          loadThirdPartyScripts();
        }, 2000);
      }

      function loadThirdPartyScripts() {
        if (!isProductionHostname()) {
          return;
        }

        // Zoho SalesIQ — widget code must be on the script URL (?wc=) per current Zoho embed
        var d=document;
        var s=d.createElement("script");
        s.type="text/javascript";
        s.id="zsiqscript";
        s.defer=true;
        s.src="https://salesiq.zohopublic.com/widget?wc=siq341f0a21deffa52db946003babb9a87b";
        var t=d.getElementsByTagName("script")[0];
        t.parentNode.insertBefore(s,t);

        // Mailchimp
        !function(c,h,i,m,p){
          m=c.createElement(h);
          p=c.getElementsByTagName(h)[0];
          m.async=1;
          m.src=i;
          p.parentNode.insertBefore(m,p);
        }(document,"script","https://chimpstatic.com/mcjs-connected/js/users/6c93f6cc2c451ffa2accc8784/188d44b94b277adffffa6d9a3.js");
      }
    </script>
