<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-labelledby="title2 desc2">
  <title id="title2">MPB Health - Turborepo technical map</title>
  <desc id="desc2">Four Vite React apps and shared packages converging on Supabase PostgreSQL.</desc>
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&amp;family=IBM+Plex+Sans:wght@400;500;600&amp;display=swap');
    </style>
    <linearGradient id="night" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12151c"/>
      <stop offset="100%" stop-color="#1a2230"/>
    </linearGradient>
    <linearGradient id="rail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="panelShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#night)"/>
  <rect width="100%" height="6" fill="url(#rail)"/>
  <g opacity="0.12" stroke="#475569" stroke-width="1">
    <path d="M0 200 H1500 M0 400 H1500 M0 600 H1500 M0 800 H1500"/>
    <path d="M150 0 V920 M450 0 V920 M750 0 V920 M1050 0 V920 M1350 0 V920"/>
  </g>

  <text x="56" y="64" font-family="'Syne', system-ui, sans-serif" font-size="32" fill="#f1f5f9" font-weight="700">Monorepo architecture</text>
  <text x="56" y="98" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="15" fill="#94a3b8">Turborepo + React / TypeScript / Vite - shared packages, one database</text>

  <!-- Apps column -->
  <text x="56" y="168" font-family="'Syne', system-ui, sans-serif" font-size="13" fill="#64748b" letter-spacing="0.12em">APPS</text>
  <g filter="url(#panelShadow)">
    <rect x="56" y="188" width="300" height="96" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="76" y="228" font-family="'Syne', system-ui, sans-serif" font-size="17" fill="#f8fafc" font-weight="600">website</text>
    <text x="76" y="252" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="12" fill="#94a3b8">Vite / marketing / forms / enrollments</text>
    <text x="310" y="238" text-anchor="end" font-family="'IBM Plex Sans', monospace" font-size="11" fill="#22d3ee">apps/website</text>
  </g>
  <g transform="translate(0,112)" filter="url(#panelShadow)">
    <rect x="56" y="188" width="300" height="96" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="76" y="228" font-family="'Syne', system-ui, sans-serif" font-size="17" fill="#f8fafc" font-weight="600">crm</text>
    <text x="76" y="252" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="12" fill="#94a3b8">Pipeline / crm-core / plans-core</text>
    <text x="310" y="238" text-anchor="end" font-family="'IBM Plex Sans', monospace" font-size="11" fill="#a78bfa">apps/crm</text>
  </g>
  <g transform="translate(0,224)" filter="url(#panelShadow)">
    <rect x="56" y="188" width="300" height="96" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="76" y="228" font-family="'Syne', system-ui, sans-serif" font-size="17" fill="#f8fafc" font-weight="600">admin-portal</text>
    <text x="76" y="252" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="12" fill="#94a3b8">CMS ops / admin-core / plans-core</text>
    <text x="310" y="238" text-anchor="end" font-family="'IBM Plex Sans', monospace" font-size="11" fill="#f472b6">apps/admin-portal</text>
  </g>
  <g transform="translate(0,336)" filter="url(#panelShadow)">
    <rect x="56" y="188" width="300" height="96" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="76" y="228" font-family="'Syne', system-ui, sans-serif" font-size="17" fill="#f8fafc" font-weight="600">advisor-portal</text>
    <text x="76" y="252" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="12" fill="#94a3b8">Field hub / advisor-core / champion-core</text>
    <text x="310" y="238" text-anchor="end" font-family="'IBM Plex Sans', monospace" font-size="11" fill="#34d399">apps/advisor-portal</text>
  </g>

  <!-- Packages grid -->
  <text x="420" y="168" font-family="'Syne', system-ui, sans-serif" font-size="13" fill="#64748b" letter-spacing="0.12em">SHARED PACKAGES</text>
  <g filter="url(#panelShadow)">
    <rect x="420" y="188" width="200" height="72" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <text x="438" y="222" font-family="'IBM Plex Sans', monospace" font-size="13" fill="#e2e8f0">@mpbhealth/database</text>
    <text x="438" y="242" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#64748b">Supabase client + types</text>
  </g>
  <g transform="translate(216,0)" filter="url(#panelShadow)">
    <rect x="420" y="188" width="200" height="72" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <text x="438" y="222" font-family="'IBM Plex Sans', monospace" font-size="13" fill="#e2e8f0">@mpbhealth/auth</text>
    <text x="438" y="242" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#64748b">Authentication layer</text>
  </g>
  <g transform="translate(432,0)" filter="url(#panelShadow)">
    <rect x="420" y="188" width="200" height="72" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <text x="438" y="222" font-family="'IBM Plex Sans', monospace" font-size="13" fill="#e2e8f0">@mpbhealth/ui</text>
    <text x="438" y="242" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#64748b">Shared React components</text>
  </g>
  <g transform="translate(648,0)" filter="url(#panelShadow)">
    <rect x="420" y="188" width="200" height="72" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <text x="438" y="222" font-family="'IBM Plex Sans', monospace" font-size="12" fill="#e2e8f0">crm-core / admin-core</text>
    <text x="438" y="242" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#64748b">Domain logic per surface</text>
  </g>
  <g transform="translate(0,88)" filter="url(#panelShadow)">
    <rect x="420" y="188" width="200" height="72" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <text x="438" y="222" font-family="'IBM Plex Sans', monospace" font-size="13" fill="#e2e8f0">advisor-core</text>
    <text x="438" y="242" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#64748b">Advisor workflows</text>
  </g>
  <g transform="translate(216,88)" filter="url(#panelShadow)">
    <rect x="420" y="188" width="200" height="72" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <text x="438" y="222" font-family="'IBM Plex Sans', monospace" font-size="13" fill="#e2e8f0">plans-core</text>
    <text x="438" y="242" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#64748b">Plan data and rules</text>
  </g>
  <g transform="translate(432,88)" filter="url(#panelShadow)">
    <rect x="420" y="188" width="200" height="72" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <text x="438" y="222" font-family="'IBM Plex Sans', monospace" font-size="13" fill="#e2e8f0">champion-core</text>
    <text x="438" y="242" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#64748b">Advisor champion flows</text>
  </g>
  <g transform="translate(648,88)" filter="url(#panelShadow)">
    <rect x="420" y="188" width="200" height="72" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <text x="438" y="222" font-family="'IBM Plex Sans', monospace" font-size="12" fill="#e2e8f0">config / utils / assets</text>
    <text x="438" y="242" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#64748b">Cross-cutting utilities</text>
  </g>

  <!-- Supabase pedestal -->
  <g filter="url(#glow)">
    <path d="M 410 720 L 1090 720 L 1040 860 L 460 860 Z" fill="#0c4a6e" stroke="#22d3ee" stroke-opacity="0.5" stroke-width="2" filter="url(#panelShadow)"/>
    <text x="750" y="770" text-anchor="middle" font-family="'Syne', system-ui, sans-serif" font-size="26" fill="#f0f9ff" font-weight="700">Supabase</text>
    <text x="750" y="802" text-anchor="middle" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="14" fill="#7dd3fc">PostgreSQL / Row Level Security / Edge Functions</text>
    <text x="750" y="830" text-anchor="middle" font-family="'IBM Plex Sans', monospace" font-size="12" fill="#38bdf8" opacity="0.9">supabase/migrations and supabase/functions</text>
  </g>

  <!-- Connectors apps -> packages -> db -->
  <g stroke="#334155" stroke-width="2" fill="none" opacity="0.85">
    <path d="M 356 236 L 390 236 L 390 224 L 420 224"/>
    <path d="M 356 348 L 400 348 L 400 252 L 420 252"/>
    <path d="M 356 460 L 400 460 L 400 280 L 420 280"/>
    <path d="M 356 572 L 390 572 L 390 308 L 420 308"/>
  </g>
  <g stroke="#22d3ee" stroke-width="2" stroke-dasharray="6 6" fill="none" opacity="0.5">
    <path d="M 750 420 L 750 680"/>
    <path d="M 520 360 L 750 360 L 750 420"/>
  </g>

  <text x="750" y="898" text-anchor="middle" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#475569">pnpm workspaces - Turbo build graph - vector for slides</text>
</svg>
